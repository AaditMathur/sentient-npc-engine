<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentient NPC Engine - Innovation Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
        }
        
        .stat-label {
            font-weight: 600;
        }
        
        .stat-value {
            font-weight: bold;
            color: #ffd700;
        }
        
        .emotion-bar {
            margin: 10px 0;
        }
        
        .emotion-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .bar {
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            transition: width 0.5s ease;
        }
        
        .legend-item {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #ffd700;
        }
        
        .legend-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .legend-spread {
            font-size: 0.85em;
            opacity: 0.8;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            margin: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 1.2em;
        }
        
        .butterfly-score {
            font-size: 2em;
            color: #ffd700;
            text-align: center;
            margin: 15px 0;
        }
        
        .quest-card {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #4ecdc4;
        }
        
        .quest-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
        }
        
        .quest-reward {
            color: #ffd700;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 Sentient NPC Engine 3.0</h1>
            <p class="subtitle">Innovation Dashboard - Real-time World Analytics</p>
        </header>
        
        <div class="controls">
            <button onclick="loadWorldState()">🔄 Refresh Data</button>
            <button onclick="simulatePanic()">😱 Simulate Panic</button>
            <button onclick="loadButterfly()">🦋 Butterfly Effects</button>
            <button onclick="loadLegends()">📜 View Legends</button>
        </div>
        
        <div id="loading" class="loading" style="display:none;">Loading...</div>
        
        <div class="grid">
            <!-- World State Card -->
            <div class="card">
                <h2>🌍 World State</h2>
                <div id="world-stats"></div>
            </div>
            
            <!-- Emotion Analytics Card -->
            <div class="card">
                <h2>😊 Collective Emotions</h2>
                <div id="emotion-bars"></div>
            </div>
            
            <!-- Causality Card -->
            <div class="card">
                <h2>⚡ Causality Chains</h2>
                <div id="causality-stats"></div>
            </div>
            
            <!-- Legends Card -->
            <div class="card">
                <h2>📜 Cultural Legends</h2>
                <div id="legends-list"></div>
            </div>
            
            <!-- Quests Card -->
            <div class="card">
                <h2>⚔️ Active Quests</h2>
                <div id="quests-list"></div>
            </div>
            
            <!-- Butterfly Effects Card -->
            <div class="card">
                <h2>🦋 Butterfly Effects</h2>
                <div id="butterfly-effects"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/v1';
        
        async function loadWorldState() {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/analytics/world-state`);
                const data = await response.json();
                
                // Update world stats
                document.getElementById('world-stats').innerHTML = `
                    <div class="stat">
                        <span class="stat-label">Total NPCs:</span>
                        <span class="stat-value">${data.total_npcs}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Causal Events:</span>
                        <span class="stat-value">${data.total_causal_events}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Causal Chains:</span>
                        <span class="stat-value">${data.total_causal_chains}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Legends:</span>
                        <span class="stat-value">${data.total_legends}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Active Quests:</span>
                        <span class="stat-value">${data.active_quests}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Dominant Emotion:</span>
                        <span class="stat-value">${data.dominant_world_emotion}</span>
                    </div>
                `;
                
                // Update emotion bars
                updateEmotionBars(data.average_emotions);
                
                // Load other data
                loadCausality();
                loadLegends();
                loadQuests();
                
            } catch (error) {
                console.error('Error loading world state:', error);
            }
            showLoading(false);
        }
        
        function updateEmotionBars(emotions) {
            const emotionIcons = {
                joy: '😊', trust: '🤝', fear: '😨', anger: '😠',
                sadness: '😢', surprise: '😲', disgust: '🤢', anticipation: '🤔'
            };
            
            let html = '';
            for (const [emotion, value] of Object.entries(emotions)) {
                const percentage = (value * 100).toFixed(1);
                html += `
                    <div class="emotion-bar">
                        <div class="emotion-label">
                            <span>${emotionIcons[emotion]} ${emotion}</span>
                            <span>${percentage}%</span>
                        </div>
                        <div class="bar">
                            <div class="bar-fill" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('emotion-bars').innerHTML = html;
        }
        
        async function loadCausality() {
            try {
                const response = await fetch(`${API_BASE}/causality/butterfly-effects?limit=3`);
                const data = await response.json();
                
                document.getElementById('causality-stats').innerHTML = `
                    <div class="stat">
                        <span class="stat-label">Butterfly Effects Found:</span>
                        <span class="stat-value">${data.total}</span>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading causality:', error);
            }
        }
        
        async function loadLegends() {
            try {
                const response = await fetch(`${API_BASE}/legends?min_spread=1`);
                const data = await response.json();
                
                let html = '';
                if (data.legends && data.legends.length > 0) {
                    data.legends.slice(0, 5).forEach(legend => {
                        html += `
                            <div class="legend-item">
                                <div class="legend-title">${legend.title}</div>
                                <div class="legend-spread">
                                    Status: ${legend.status} | Spread: ${legend.spread} NPCs
                                </div>
                            </div>
                        `;
                    });
                } else {
                    html = '<p>No legends yet. Create some dramatic events!</p>';
                }
                document.getElementById('legends-list').innerHTML = html;
            } catch (error) {
                console.error('Error loading legends:', error);
            }
        }
        
        async function loadQuests() {
            try {
                const response = await fetch(`${API_BASE}/quests/available?limit=5`);
                const data = await response.json();
                
                let html = '';
                if (data.quests && data.quests.length > 0) {
                    data.quests.forEach(quest => {
                        html += `
                            <div class="quest-card">
                                <div class="quest-title">${quest.title}</div>
                                <div>${quest.description.substring(0, 100)}...</div>
                                <div class="quest-reward">💰 ${quest.rewards.gold} gold</div>
                            </div>
                        `;
                    });
                } else {
                    html = '<p>No active quests. NPCs will generate quests based on events!</p>';
                }
                document.getElementById('quests-list').innerHTML = html;
            } catch (error) {
                console.error('Error loading quests:', error);
            }
        }
        
        async function loadButterfly() {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/causality/butterfly-effects?limit=5`);
                const data = await response.json();
                
                let html = '';
                if (data.examples && data.examples.length > 0) {
                    data.examples.forEach(example => {
                        html += `
                            <div class="legend-item">
                                <div class="legend-title">${example.title}</div>
                                <div class="butterfly-score">🦋 ${example.butterfly_score.toFixed(1)}</div>
                                <div>Root: ${example.root_cause}</div>
                                <div>Amplification: ${example.amplification.toFixed(1)}x</div>
                                <div>Affected: ${example.total_actors_affected} entities</div>
                            </div>
                        `;
                    });
                } else {
                    html = '<p>No butterfly effects yet. Actions will create cascading consequences!</p>';
                }
                document.getElementById('butterfly-effects').innerHTML = html;
            } catch (error) {
                console.error('Error loading butterfly effects:', error);
            }
            showLoading(false);
        }
        
        async function simulatePanic() {
            if (!confirm('Simulate a panic event? This will affect all NPCs!')) return;
            
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/emotion/contagion/panic`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        location: 'Market Square',
                        panic_source: 'Dragon attack!',
                        intensity: 0.9
                    })
                });
                const data = await response.json();
                alert(`Panic spread! ${data.affected_npcs}/${data.total_npcs} NPCs affected (${data.penetration_rate})`);
                loadWorldState();
            } catch (error) {
                console.error('Error simulating panic:', error);
                alert('Error: ' + error.message);
            }
            showLoading(false);
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        // Auto-refresh every 30 seconds
        setInterval(loadWorldState, 30000);
        
        // Initial load
        loadWorldState();
    </script>
</body>
</html>
